<!-- VenueFlow AI Chatbot UI -->
<div id="chatbot-container" class="fixed bottom-6 right-6 z-[10000] flex flex-col items-end">
  
  <!-- Chat Window -->
  <div id="chat-window" class="hidden glass-bright w-80 h-[480px] rounded-3xl mb-4 flex-col overflow-hidden border border-indigo-500/30 shadow-2xl" style="background:rgba(2,0,16,.95);backdrop-filter:blur(32px)">
    <!-- Header -->
    <div class="px-5 py-4 border-b border-indigo-500/20 flex items-center justify-between" style="background:linear-gradient(90deg,rgba(99,102,241,.1),transparent)">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl flex items-center justify-center text-sm pulse" style="background:linear-gradient(135deg,#3b82f6,#6366f1)">✨</div>
        <div>
          <p class="font-orb text-[10px] font-black tracking-wider text-indigo-400">VENUEFLOW AI</p>
          <p class="text-[8px] font-mono text-green-400 animate-pulse">● ONLINE</p>
        </div>
      </div>
      <button onclick="window.vfChat.toggle()" class="w-7 h-7 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/5 transition-all">✕</button>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="flex-grow overflow-y-auto p-5 space-y-4 scroll-smooth">
      <!-- Injected by chatbot.js -->
    </div>

    <!-- Input Area -->
    <form id="chat-form" class="p-4 border-t border-indigo-500/20 bg-black/40">
      <div class="relative flex items-center">
        <input id="chat-input" type="text" placeholder="Ask anything about the venue..." class="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-3 text-xs text-white outline-none focus:border-indigo-500/50 transition-all font-medium pr-10">
        <button type="submit" class="absolute right-2 w-8 h-8 rounded-xl flex items-center justify-center text-indigo-400 hover:text-indigo-300 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
        </button>
      </div>
      <p class="text-[7px] text-center mt-3 font-mono text-gray-500 uppercase tracking-widest">Powered by Google Gemini 2.5 Flash</p>
    </form>
  </div>

  <!-- Floating Toggle Button -->
  <button id="chat-toggle" class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-2xl transition-all hover:scale-105 active:scale-95 group relative mb-2" style="background:linear-gradient(135deg,#3b82f6,#6366f1)">
    <div class="absolute inset-0 rounded-2xl blur-lg bg-indigo-500/40 group-hover:bg-indigo-500/60 transition-all"></div>
    <span class="relative text-2xl group-hover:rotate-12 transition-all">💬</span>
  </button>
  <span class="text-[8px] font-orb font-black text-indigo-400 tracking-tighter mr-1 uppercase opacity-60">AI Assistant</span>
</div>

<style>
#chat-messages::-webkit-scrollbar { width: 4px; }
#chat-messages::-webkit-scrollbar-thumb { background: rgba(99,102,241,.2); border-radius: 10px; }
.animate-in { animation: chatIn .4s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
@keyframes chatIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
</style>

<script src="/static/js/chatbot.js"></script>
