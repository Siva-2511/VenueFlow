<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueFlow | Staff Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <!-- ZXing for QR -->
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex flex-col font-sans">
    <nav class="bg-black/70 backdrop-blur-md px-6 py-4 flex justify-between border-b border-white/10 shrink-0">
        <h1 class="text-lg font-bold text-yellow-400">🧑 Staff | Gate 5 Scanner</h1>
        <a href="/logout" class="text-sm font-semibold text-red-500 hover:text-red-400 bg-red-500/10 px-3 py-1 rounded">Logout</a>
    </nav>
    <main class="flex-grow flex flex-col p-6 max-w-lg mx-auto w-full gap-6">
        <div class="bg-[#111] rounded-3xl p-6 text-center border border-white/10 shadow-xl shrink-0 relative overflow-hidden">
            <div id="gate5-status" class="absolute top-4 right-4 w-3 h-3 rounded-full bg-green-500 pulse-dot shadow-[0_0_10px_rgba(34,197,94,0.8)]"></div>
            <h2 class="text-gray-400 text-sm uppercase tracking-wider font-semibold">Gate 5 Backlog</h2>
            <p class="text-6xl font-bold font-mono mt-3 text-white" id="gate5-count">Sync...</p>
        </div>
        <div class="flex-grow bg-[#111] rounded-3xl overflow-hidden relative border border-white/10 flex flex-col min-h-[300px] shadow-xl">
            <video id="video" class="w-full h-full object-cover absolute inset-0"></video>
            <div class="absolute inset-0 border-4 border-dashed border-white/30 pointer-events-none rounded-2xl m-6 z-10 transition-colors" id="scan-frame"></div>
            
            <div class="mt-auto z-20 w-full p-6 bg-gradient-to-t from-black via-black/80 to-transparent text-center">
                <div id="scan-result" class="font-mono text-sm text-gray-300">Awaiting visual alignment...</div>
            </div>
            
            <button id="start-btn" class="absolute inset-0 bg-black/60 backdrop-blur-sm z-30 font-bold text-lg text-white hover:bg-black/40 transition-all flex flex-col items-center justify-center gap-3">
                <span class="text-4xl">📷</span> Enable QR Scanner
            </button>
        </div>
    </main>
    <script src="{{ url_for('static', filename='js/websocket.js') }}"></script>
    <script src="{{ url_for('static', filename='js/qr-scanner.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => initWebSockets('staff'));
    </script>
</body>
</html>
