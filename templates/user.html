<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueFlow | User AR Match</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="bg-black text-white overflow-hidden h-screen w-screen relative">
    <video id="camera-feed" class="absolute inset-0 w-full h-full object-cover z-0" autoplay playsinline muted></video>
    <div class="relative z-10 flex flex-col h-full bg-black/20 pb-8 px-4">
        <header class="pt-12 pb-4 flex justify-between items-center px-4">
            <a href="/logout" class="bg-white/20 backdrop-blur border border-white/30 px-4 py-2 rounded-xl text-sm font-bold shadow-lg">Logout</a>
            <div class="bg-black/60 backdrop-blur-md border border-white/20 px-4 py-2 rounded-full font-mono text-xs shadow-[0_0_15px_rgba(34,197,94,0.5)]">
                <span class="text-green-400 mr-2 pulse-dot inline-block">●</span> NAVIGATING GATE 5
            </div>
        </header>

        <div class="flex-grow flex items-center justify-center relative">
            <svg viewBox="0 0 100 200" class="absolute w-64 h-96 pointer-events-none opacity-80 z-20 overflow-visible">
                <path id="ar-path" d="M 50 200 L 50 100 L 80 50 L 50 10" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-[0_0_12px_rgba(34,197,94,0.9)]" />
                <circle cx="50" cy="10" r="8" fill="#22c55e" class="animate-ping" />
            </svg>
            <div class="absolute px-6 py-3 bg-green-500 border border-green-400 text-white rounded-xl text-sm font-bold shadow-2xl transform -translate-y-36 ar-instruction hidden tracking-wide">
                Keep straight towards Gate 5
            </div>
        </div>
        
        <div class="bg-black/60 backdrop-blur-xl border border-white/20 p-6 rounded-3xl shadow-2xl ar-card mx-2">
            <div class="flex justify-between items-center mb-2">
                <span class="text-gray-400 text-sm">Assigned Gate</span>
                <span class="text-gray-400 text-sm">Walking</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-3xl font-bold text-white tracking-widest">GATE 5</span>
                <span class="text-2xl font-semibold text-green-400">4 min</span>
            </div>
        </div>
    </div>
    <script>
        const video = document.getElementById('camera-feed');
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(stream => { video.srcObject = stream; })
                .catch(err => console.error("Camera error:", err));
        }

        gsap.from('.ar-card', { y: 100, opacity: 0, duration: 1, ease: 'power3.out' });
        const path = document.getElementById('ar-path');
        const length = path.getTotalLength();
        gsap.set(path, { strokeDasharray: length, strokeDashoffset: length });
        gsap.to(path, { strokeDashoffset: 0, duration: 3, ease: 'power2.inOut', delay: 0.5 });
        setTimeout(() => document.querySelector('.ar-instruction').classList.remove('hidden'), 2000);
    </script>
</body>
</html>
