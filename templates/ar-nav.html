<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueFlow | AR Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="bg-black text-white overflow-hidden h-screen w-screen relative">

    <!-- Camera Feed -->
    <video id="camera-feed" class="absolute inset-0 w-full h-full object-cover z-0" autoplay playsinline muted></video>

    <!-- AR Overlay UI -->
    <div class="relative z-10 flex flex-col h-full bg-black/20 pb-8 px-4">
        
        <!-- Header -->
        <header class="pt-12 pb-4 flex justify-between items-center px-4">
            <a href="/dashboard" class="bg-white/20 backdrop-blur border border-white/30 p-3 rounded-full hover:bg-white/30 transition-all font-bold">
                ⬅ Back
            </a>
            <div class="bg-black/50 backdrop-blur-md border border-white/20 px-6 py-2 rounded-full font-mono text-sm shadow-[0_0_15px_rgba(34,197,94,0.3)]">
                <span class="text-green-400 mr-2">●</span> NAVIGATING TO GATE 1
            </div>
        </header>

        <!-- AR Path Area -->
        <div class="flex-grow flex items-center justify-center relative">
            <!-- Simulated AR Path Lines -->
            <svg viewBox="0 0 100 200" class="absolute w-64 h-96 pointer-events-none opacity-80 z-20 overflow-visible">
                <path id="ar-path" d="M 50 200 L 50 100 L 80 50 L 50 10" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-[0_0_8px_rgba(34,197,94,0.8)]" />
                <circle cx="50" cy="10" r="6" fill="#22c55e" class="animate-ping" />
            </svg>
            
            <div class="absolute px-4 py-2 bg-green-500 text-white rounded-lg text-sm font-bold shadow-lg transform -translate-y-32 ar-instruction">
                Turn Right in 20ft
            </div>
        </div>

        <!-- Footer Stats -->
        <div class="bg-black/60 backdrop-blur-xl border border-white/20 p-6 rounded-3xl shadow-2xl ar-card">
            <div class="flex justify-between items-center mb-2">
                <span class="text-gray-400 text-sm">Est. Time</span>
                <span class="text-gray-400 text-sm">Distance</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-3xl font-bold text-white">4 min</span>
                <span class="text-3xl font-bold text-white">250 m</span>
            </div>
            <button class="w-full mt-4 bg-white/10 hover:bg-white/20 py-3 rounded-xl border border-white/30 transition-all" onclick="if(navigator.vibrate)navigator.vibrate(200); alert('Vibration Haptic Triggered - Path Recalculating')">
                Recalculate Route
            </button>
        </div>
    </div>

    <script>
        // Start Camera
        const video = document.getElementById('camera-feed');
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(stream => { video.srcObject = stream; })
                .catch(err => console.error("Camera error:", err));
        }

        // GSAP AR Instructions Animation
        gsap.from('.ar-card', { y: 100, opacity: 0, duration: 1, ease: 'power3.out' });
        
        // Draw path animation
        const path = document.getElementById('ar-path');
        const length = path.getTotalLength();
        gsap.set(path, { strokeDasharray: length, strokeDashoffset: length });
        gsap.to(path, { strokeDashoffset: 0, duration: 2, ease: 'power2.inOut', delay: 0.5 });
        
        gsap.from('.ar-instruction', { y: -50, opacity: 0, duration: 0.5, delay: 2, yoyo: true, repeat: -1, repeatDelay: 3 });
    </script>
</body>
</html>
