<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueFlow AI | Stadium Intelligence Platform</title>
    <meta name="description" content="VenueFlow — Real-time crowd management for IPL Final 2026">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-[#030303] text-white overflow-hidden font-sans min-h-screen flex flex-col">
    
    <div id="canvas-container" class="fixed inset-0 z-0 opacity-80"></div>

    <!-- Noise overlay -->
    <div class="fixed inset-0 z-[1] pointer-events-none opacity-[0.03]" style="background-image: url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22><filter id=%22n%22><feTurbulence type=%22fractalNoise%22 baseFrequency=%220.75%22/></filter><rect width=%22300%22 height=%22300%22 filter=%22url(%23n)%22 opacity=%221%22/></svg>')"></div>
    
    <div class="relative z-10 flex flex-col items-center justify-center flex-grow px-4 py-8">
        <div class="login-card w-full max-w-[420px]" style="opacity:0; transform: translateY(40px)">
            
            <!-- Logo header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-500 shadow-[0_0_40px_rgba(99,102,241,0.6)] mb-5 border border-indigo-400/30 float">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
                <h1 class="text-4xl font-black tracking-tight text-white">VenueFlow</h1>
                <p class="text-gray-500 text-sm mt-1 font-medium tracking-widest uppercase">Stadium Intelligence Platform</p>
                <div class="mt-3 inline-flex items-center gap-2 bg-yellow-500/10 border border-yellow-500/20 px-3 py-1 rounded-full">
                    <span class="w-1.5 h-1.5 rounded-full bg-yellow-400 pulse-dot"></span>
                    <span class="text-yellow-400 text-[10px] font-bold tracking-widest uppercase">IPL Final 2026 · Live</span>
                </div>
            </div>

            <!-- Login Form -->
            <div class="glass rounded-3xl p-8 shadow-2xl">
                <form id="real-login" class="flex flex-col gap-4 mb-6">
                    <div class="group">
                        <label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2 block" for="email">Email Address</label>
                        <input type="email" id="email" name="email" required 
                               autocomplete="email"
                               placeholder="your@gmail.com"
                               class="w-full bg-white/5 border border-white/10 focus:border-blue-500 focus:bg-blue-500/5 rounded-xl px-4 py-3.5 text-white placeholder-gray-700 outline-none transition-all duration-300 text-sm shadow-inner">
                    </div>
                    <div class="group">
                        <label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2 block" for="password">Password</label>
                        <input type="password" id="password" name="password" required 
                               autocomplete="current-password"
                               placeholder="••••••••"
                               class="w-full bg-white/5 border border-white/10 focus:border-blue-500 focus:bg-blue-500/5 rounded-xl px-4 py-3.5 text-white outline-none transition-all duration-300 text-sm shadow-inner">
                    </div>
                    <p id="login-error" class="text-red-400 text-xs font-bold text-center hidden"></p>
                    <button type="submit" id="submit-btn"
                            class="w-full mt-1 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3.5 rounded-xl transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98] shadow-[0_0_20px_rgba(99,102,241,0.3)] hover:shadow-[0_0_30px_rgba(99,102,241,0.5)] flex items-center justify-center gap-2">
                        <span id="btn-text">Access Platform</span>
                        <svg id="btn-loading" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center gap-4 mb-5">
                    <div class="flex-grow h-px bg-white/8"></div>
                    <span class="text-gray-600 text-[10px] font-bold tracking-widest uppercase">or</span>
                    <div class="flex-grow h-px bg-white/8"></div>
                </div>

                <!-- Google Sign In -->
                <div class="flex flex-col items-center gap-2">
                    <div id="g_id_onload"
                         data-client_id="{{ google_client_id }}"
                         data-context="signin"
                         data-ux_mode="popup"
                         data-callback="handleGoogleRes"
                         data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin" 
                         data-type="standard" 
                         data-theme="filled_black" 
                         data-size="large" 
                         data-width="350"
                         data-text="signin_with"
                         data-shape="rectangular">
                    </div>
                    <p class="text-[10px] text-gray-600 text-center mt-1">Google account email auto-assigns your role</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="relative z-10 border-t border-white/5 py-3 px-6 text-center text-gray-700 text-[10px] font-mono uppercase tracking-widest">
        VenueFlow AI · IPL Final 2026 · Crowd Intelligence Platform
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="{{ url_for('static', filename='js/three-stadium.js') }}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            initLogin3D();
            gsap.to('.login-card', { y: 0, opacity: 1, duration: 1.2, ease: "expo.out", delay: 0.1 });
        });

        document.getElementById('real-login').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('login-error');
            
            document.getElementById('btn-text').innerText = 'Verifying...';
            document.getElementById('btn-loading').classList.remove('hidden');
            errEl.classList.add('hidden');
            
            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            }).then(r => r.json()).then(data => {
                if (data.status === 'success') {
                    gsap.to('.login-card', { y: -40, scale: 0.95, opacity: 0, duration: 0.6, ease: "power3.in", 
                        onComplete: () => { window.location.href = data.redirect; }});
                } else {
                    document.getElementById('btn-text').innerText = 'Access Platform';
                    document.getElementById('btn-loading').classList.add('hidden');
                    gsap.fromTo('.login-card', {x: -10}, {x: 10, yoyo: true, repeat: 5, duration: 0.07, ease: "power1.inOut", onComplete: () => gsap.set('.login-card', {x:0})});
                    errEl.innerText = data.message || 'Invalid credentials.';
                    errEl.classList.remove('hidden');
                }
            }).catch(() => {
                document.getElementById('btn-text').innerText = 'Access Platform';
                document.getElementById('btn-loading').classList.add('hidden');
                alert('Server unreachable. Ensure the Flask server is running.');
            });
        });

        function handleGoogleRes(response) {
            gsap.to('.login-card', {scale: 0.97, opacity: 0.8, duration: 0.3});
            fetch('/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: response.credential })
            }).then(r => r.json()).then(data => {
                if (data.status === 'success') {
                    gsap.to('.login-card', { y: -40, scale: 0.9, opacity: 0, duration: 0.6, ease: "power3.in",
                        onComplete: () => { window.location.href = data.redirect; }});
                } else {
                    gsap.to('.login-card', {scale: 1, opacity: 1, duration: 0.3});
                    const errEl = document.getElementById('login-error');
                    errEl.innerText = 'Google Auth: ' + data.message;
                    errEl.classList.remove('hidden');
                }
            }).catch(() => {
                gsap.to('.login-card', {scale: 1, opacity: 1, duration: 0.3});
            });
        }
    </script>
</body>
</html>
