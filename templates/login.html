<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueFlow AI | Multi-Role Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class', theme: { extend: { colors: { dark: '#0a0a0a' } } } }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-white dark:bg-dark text-gray-900 dark:text-white overflow-hidden font-sans">
    
    <div id="canvas-container" class="absolute inset-0 z-0"></div>

    <div class="relative z-10 flex flex-col items-center justify-center min-h-screen bg-black/40 backdrop-blur-sm">
        <div class="login-card bg-white/10 dark:bg-black/50 border border-white/20 p-8 rounded-3xl shadow-2xl backdrop-blur-lg transform translate-y-8 opacity-0 text-center max-w-sm w-full mx-4">
            <h1 class="text-3xl font-bold mb-1 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">VenueFlow v4.0</h1>
            <p class="text-gray-300 mb-6 text-sm">Select your role to enter</p>

            <form id="real-login" class="flex flex-col gap-3 mb-4 text-left">
                <div>
                    <label class="text-xs text-gray-400">Email (admin/staff/user/guest@venue.com)</label>
                    <input type="email" id="email" required class="w-full bg-black/50 border border-gray-600 rounded-lg px-3 py-2 text-white placeholder-gray-500 mt-1" value="admin@venue.com">
                </div>
                <div>
                    <label class="text-xs text-gray-400">Password (role+123)</label>
                    <input type="password" id="password" required class="w-full bg-black/50 border border-gray-600 rounded-lg px-3 py-2 text-white mt-1" value="admin123">
                </div>
                <button type="submit" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-xl transition-all">Sign In</button>
            </form>

            <div class="relative flex items-center py-3">
                <div class="flex-grow border-t border-gray-500"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-xs">OR BYPASS AUTH</span>
                <div class="flex-grow border-t border-gray-500"></div>
            </div>

            <button onclick="handleAuth('google')" class="w-full mb-3 flex items-center justify-center gap-2 bg-white text-gray-800 font-semibold py-2 px-4 rounded-xl transition-all border border-gray-200">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google (User Demo)
            </button>
            <button onclick="handleAuth('guest')" class="w-full bg-white/20 hover:bg-white/30 text-white font-semibold py-2 px-4 rounded-xl border border-white/30 transition-all shadow-[0_0_15px_rgba(255,255,255,0.1)] hover:shadow-[0_0_20px_rgba(255,255,255,0.3)]">
                🚀 Guest (Evaluator Demo)
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="{{ url_for('static', filename='js/three-stadium.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            initLogin3D();
            gsap.to('.login-card', { y: 0, opacity: 1, duration: 1.5, ease: "expo.out", delay: 0.2 });
        });
    </script>
</body>
</html>
