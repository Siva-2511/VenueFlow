<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueFlow | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body class="bg-gray-50 dark:bg-[#0a0a0a] text-white">
    <nav class="fixed w-full z-50 bg-black/70 backdrop-blur-md px-6 py-3 flex justify-between border-b border-white/10">
        <h1 class="text-lg font-bold text-blue-400">👑 Admin Base</h1>
        <a href="/logout" class="text-sm text-red-500 hover:text-red-400">Logout</a>
    </nav>
    <main class="pt-20 px-6 max-w-7xl mx-auto flex flex-col lg:flex-row gap-6">
        <div class="lg:w-2/3 space-y-6">
            <div class="bg-[#111] p-6 rounded-2xl border border-white/10 shadow-xl">
                <h2 class="text-xl font-semibold mb-4">Total Capacity</h2>
                <div class="w-full bg-gray-800 rounded-full h-8 overflow-hidden relative">
                    <div id="total-bar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                    <span id="total-text" class="absolute inset-0 flex items-center justify-center font-bold">Connecting...</span>
                </div>
            </div>
            <div class="bg-[#111] p-6 rounded-2xl border border-white/10 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">12 Gates Live Map</h2>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4" id="gates-grid">
                    <!-- Gates injected by JS -->
                </div>
            </div>
        </div>
        <div class="lg:w-1/3 space-y-6">
            <div class="bg-[#111] p-6 rounded-2xl border border-white/10 shadow-xl min-h-[300px]">
                <h2 class="text-xl font-semibold text-red-400 mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full pulse-dot bg-red-500 inline-block"></span> Critical Alerts
                </h2>
                <div id="alerts-container" class="space-y-3">
                    <p class="text-gray-500 italic text-sm">Syncing with sensor grid...</p>
                </div>
            </div>
        </div>
    </main>
    <script src="{{ url_for('static', filename='js/websocket.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => initWebSockets('admin'));
    </script>
</body>
</html>
